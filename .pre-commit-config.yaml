default_language_version:
  python: python3
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix", "--quiet", "--output-format=concise"]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: ["--quiet"]
        stages: [pre-commit, manual]

  - repo: local
    hooks:
      - id: markdown-lint
        name: markdown-lint
        entry: tools/markdown-lint
        language: system
        types: [markdown]

      - id: context-check-lite
        name: context-check-lite
        entry: tools/context-check-lite
        language: system
        pass_filenames: false
        files: "^docs/"

      - id: tests-precommit
        name: tests-precommit
        entry: "bash -c 'if [[ -d tests ]]; then python3 -m unittest discover -s tests -p \"test_*.py\"; else echo \"tests-precommit: no tests/ directory\"; fi'"
        language: system
        pass_filenames: false

      - id: codex-autofix-fallback
        name: codex-autofix-fallback
        entry: tools/codex-autofix --hook-fallback
        language: system
        pass_filenames: false
        always_run: true

      - id: tests-prepush
        name: tests-prepush
        entry: echo "pre-push checks are lightweight by design"
        language: system
        pass_filenames: false
        stages: [pre-push]
